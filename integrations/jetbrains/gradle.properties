# AgentSpan IntelliJ plugin properties
pluginGroup = com.agentspan
pluginVersion = 0.1.0

# IntelliJ Platform target. 2023.3 ships with a JBR 17 runtime and a stable
# java.net.http.HttpClient, which the client relies on.
platformType = IC
platformVersion = 2023.3.6

# since/until build range. Leaving untilBuild open-ended-ish but pinned to the
# 2024.* line so the plugin keeps loading on newer IDEs without a forced rebuild.
pluginSinceBuild = 233
pluginUntilBuild = 243.*

# Gradle
org.gradle.jvmargs = -Xmx2048m
org.gradle.caching = true
kotlin.stdlib.default.dependency = false
