name: Load test

on:
  push:
    # Only run the load test on release tags — not on every push to main
    # (a 1000-RPS smoke test isn't meaningful on a shared CI runner per commit).
    tags: ["v*"]
  pull_request:
    # Informational on PRs — won't block merge, but surfaces regressions.
  workflow_dispatch:

jobs:
  loadtest:
    name: k6 smoke (1000 RPS, p99<200ms)
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release API
        run: cargo build --release --bin agentspan-api

      - name: Start AgentSpan API
        run: |
          ./target/release/agentspan-api --port 18080 > api.log 2>&1 &
          echo $! > api.pid
          # Wait for /health — and fail loudly if it never comes up, instead
          # of letting k6 hammer a port nobody is listening on.
          for i in $(seq 1 100); do
            if curl -sf http://127.0.0.1:18080/health >/dev/null 2>&1; then
              echo "API healthy on :18080"
              exit 0
            fi
            sleep 0.1
          done
          echo "::error::API did not become healthy on :18080 within 10s"
          cat api.log
          exit 1

      # Official installer action (downloads the release binary) — the old
      # apt + hkp keyserver route flaked with "keyserver receive failed".
      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 smoke load test
        env:
          BASE_URL: http://127.0.0.1:18080
        run: k6 run tests/load/k6_smoke.js

      - name: Show API log on failure
        if: failure()
        run: cat api.log || true

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then
            kill $(cat api.pid) 2>/dev/null || true
          fi
