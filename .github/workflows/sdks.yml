name: SDKs

on:
  push:
    branches: [main, master]
  pull_request:

# The Rust SDK (sdk/rust) is a workspace member and is covered by the main `ci`
# workflow's `cargo test`. Python is covered there too. This workflow exercises
# the remaining language SDKs plus the web dashboard build.
jobs:
  js:
    name: JS SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --test

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - run: go test ./...

  ruby:
    name: Ruby SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: sdk/ruby
      - run: bundle exec rake test

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: mvn -q test

  php:
    name: PHP SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: composer install --no-interaction --no-progress
      - run: composer test

  csharp:
    name: C# SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test tests/AgentSpan.Tests.csproj

  swift:
    name: Swift SDK
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sdk/swift
    steps:
      - uses: actions/checkout@v4
      - run: swift test

  dashboard:
    name: Web dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
