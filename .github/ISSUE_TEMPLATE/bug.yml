---
name: Bug report
about: Report something that isn't working as expected
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: What commands did you run? What did you expect vs. what happened?
      value: |
        1. Run `agentspan ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS, channels involved.
      value: |
        - AgentSpan version: (run `agentspan version`)
        - OS / arch:
        - Channel(s) involved:
        - `agentspan doctor` output (if relevant):
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, config (with secrets redacted), screenshots.
    validations:
      required: false
